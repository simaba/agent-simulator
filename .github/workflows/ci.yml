name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  test-and-run-scenarios:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Run tests
        run: python -m pytest -q

      - name: Run installed CLI scenarios
        run: |
          agent-simulator --scenario normal_success
          agent-simulator --scenario retry_then_success
          agent-simulator --scenario fallback_after_failure
          agent-simulator --scenario escalate_after_failure

      - name: Build and install wheel in a clean environment
        run: |
          python -m build
          python -m venv /tmp/installed-simulator
          /tmp/installed-simulator/bin/python -m pip install dist/*.whl
          /tmp/installed-simulator/bin/agent-simulator --scenario normal_success
